name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test backend
        run: npx nx test backend --passWithNoTests --ci

      - name: Test frontend
        run: npx nx test frontend --passWithNoTests --ci

      - name: Build backend
        run: npx nx build backend --configuration=production

      - name: Build frontend
        run: npx nx build frontend --configuration=production
